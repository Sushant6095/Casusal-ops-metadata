<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 560" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 -5 10 10" refX="10" refY="0" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,-5L10,0L0,5" fill="#9CA3AF"/>
    </marker>
    <style>
      .box { fill:#101828; stroke:#1F2937; stroke-width:1.5; rx:10; ry:10; }
      .box.accent { stroke:#22D3EE; }
      .box.store { fill:#0B1220; stroke:#374151; }
      .title { fill:#E5E7EB; font-size:14px; font-weight:600; }
      .sub { fill:#9CA3AF; font-size:11px; }
      .edge { stroke:#4B5563; stroke-width:1.3; fill:none; }
      .edge.dash { stroke-dasharray:5 3; }
      .h { fill:#22D3EE; font-size:12px; font-weight:700; letter-spacing:0.08em; }
    </style>
  </defs>

  <rect width="1100" height="560" fill="#0B1220"/>
  <text x="40" y="36" class="h">CAUSALOPS — SYSTEM ARCHITECTURE</text>

  <!-- OpenMetadata -->
  <g transform="translate(60,80)">
    <rect class="box store" width="200" height="80"/>
    <text x="100" y="32" text-anchor="middle" class="title">OpenMetadata</text>
    <text x="100" y="52" text-anchor="middle" class="sub">lineage · events · DQ · tags</text>
    <text x="100" y="68" text-anchor="middle" class="sub">:8585 (REST + webhook)</text>
  </g>

  <!-- Ingestor -->
  <g transform="translate(340,80)">
    <rect class="box" width="200" height="80"/>
    <text x="100" y="32" text-anchor="middle" class="title">Ingestor</text>
    <text x="100" y="52" text-anchor="middle" class="sub">pollLineage / pollEvents</text>
    <text x="100" y="68" text-anchor="middle" class="sub">bullmq · drizzle</text>
  </g>

  <!-- TimescaleDB -->
  <g transform="translate(620,80)">
    <rect class="box store" width="200" height="80"/>
    <text x="100" y="32" text-anchor="middle" class="title">TimescaleDB</text>
    <text x="100" y="52" text-anchor="middle" class="sub">change_events · test_results</text>
    <text x="100" y="68" text-anchor="middle" class="sub">lineage_edges · entities</text>
  </g>

  <!-- Causal worker -->
  <g transform="translate(900,80)">
    <rect class="box accent" width="160" height="80"/>
    <text x="80" y="32" text-anchor="middle" class="title">causal-worker</text>
    <text x="80" y="52" text-anchor="middle" class="sub">FastAPI · DoWhy</text>
    <text x="80" y="68" text-anchor="middle" class="sub">:8000</text>
  </g>

  <!-- API -->
  <g transform="translate(480,260)">
    <rect class="box accent" width="220" height="90"/>
    <text x="110" y="34" text-anchor="middle" class="title">API · Fastify + tRPC</text>
    <text x="110" y="54" text-anchor="middle" class="sub">graph · failures · counterfactual</text>
    <text x="110" y="70" text-anchor="middle" class="sub">intervention · events · webhook</text>
    <text x="110" y="84" text-anchor="middle" class="sub">:3001</text>
  </g>

  <!-- Web -->
  <g transform="translate(120,420)">
    <rect class="box" width="220" height="80"/>
    <text x="110" y="32" text-anchor="middle" class="title">Web · Next.js 15</text>
    <text x="110" y="52" text-anchor="middle" class="sub">/ /graph /why /what-if</text>
    <text x="110" y="68" text-anchor="middle" class="sub">:3000</text>
  </g>

  <!-- MCP -->
  <g transform="translate(440,420)">
    <rect class="box" width="300" height="80"/>
    <text x="150" y="32" text-anchor="middle" class="title">MCP server</text>
    <text x="150" y="52" text-anchor="middle" class="sub">rank_causes · simulate_intervention</text>
    <text x="150" y="68" text-anchor="middle" class="sub">get_risk_score · list_failures · stdio/sse</text>
  </g>

  <!-- OM chat -->
  <g transform="translate(820,420)">
    <rect class="box store" width="220" height="80"/>
    <text x="110" y="32" text-anchor="middle" class="title">OM chat (MCP host)</text>
    <text x="110" y="52" text-anchor="middle" class="sub">or Claude Desktop</text>
    <text x="110" y="68" text-anchor="middle" class="sub">calls tools via MCP</text>
  </g>

  <!-- Edges: OM -> Ingestor -> TS -> Worker  (top row) -->
  <path class="edge" d="M260 120 L340 120" marker-end="url(#arrow)"/>
  <path class="edge" d="M540 120 L620 120" marker-end="url(#arrow)"/>
  <path class="edge" d="M820 120 L900 120" marker-end="url(#arrow)"/>

  <!-- API <-> TS -->
  <path class="edge" d="M620 160 Q620 220 590 260" marker-end="url(#arrow)"/>
  <!-- API -> Worker -->
  <path class="edge" d="M700 290 Q830 230 900 160" marker-end="url(#arrow)"/>
  <!-- API -> OM (writeback + webhook recv) -->
  <path class="edge dash" d="M480 290 Q300 220 260 160" marker-end="url(#arrow)"/>

  <!-- Web -> API -->
  <path class="edge" d="M230 420 Q360 360 480 330" marker-end="url(#arrow)"/>
  <!-- MCP -> API -->
  <path class="edge" d="M590 420 L590 350" marker-end="url(#arrow)"/>
  <!-- OM chat -> MCP -->
  <path class="edge" d="M820 460 L740 460" marker-end="url(#arrow)"/>

  <!-- legend -->
  <g transform="translate(60,520)">
    <line x1="0" y1="0" x2="30" y2="0" class="edge"/>
    <text x="40" y="4" class="sub">solid = request/response</text>
    <line x1="220" y1="0" x2="250" y2="0" class="edge dash"/>
    <text x="260" y="4" class="sub">dashed = writeback / webhook</text>
  </g>
</svg>
