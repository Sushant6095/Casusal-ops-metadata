<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#1F2937" stroke-width="0.5" opacity="0.4"/>
    </pattern>

    <radialGradient id="heroGlow" cx="50%" cy="0%" r="80%">
      <stop offset="0%"   stop-color="#22D3EE" stop-opacity="0.18"/>
      <stop offset="60%"  stop-color="#8B5CF6" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0B1220" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="gSource" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#1A2235"/><stop offset="100%" stop-color="#0E1626"/>
    </linearGradient>
    <linearGradient id="gIngest" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#1A2435"/><stop offset="100%" stop-color="#0F1828"/>
    </linearGradient>
    <linearGradient id="gStore" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#1B2335"/><stop offset="100%" stop-color="#0F1727"/>
    </linearGradient>
    <linearGradient id="gReason" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#231a35"/><stop offset="100%" stop-color="#160F26"/>
    </linearGradient>
    <linearGradient id="gServe" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#1A2235"/><stop offset="100%" stop-color="#0E1626"/>
    </linearGradient>

    <linearGradient id="bandSource" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#10B981" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#10B981" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bandIngest" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#22D3EE" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#22D3EE" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bandStore" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#F59E0B" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#F59E0B" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bandReason" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#A78BFA" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#A78BFA" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bandServe" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#22D3EE" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#22D3EE" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <marker id="arr" viewBox="0 -5 10 10" refX="9" refY="0" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,-5L10,0L0,5" fill="#6B7280"/>
    </marker>
    <marker id="arrCyan" viewBox="0 -5 10 10" refX="9" refY="0" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,-5L10,0L0,5" fill="#22D3EE"/>
    </marker>
    <marker id="arrViolet" viewBox="0 -5 10 10" refX="9" refY="0" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,-5L10,0L0,5" fill="#A78BFA"/>
    </marker>

    <style>
      .hotPath { stroke-dasharray: 8 4; animation: flow 1.4s linear infinite; }
      @keyframes flow { to { stroke-dashoffset: -24; } }
      .h     { fill:#22D3EE; font-size:11px; font-weight:700; letter-spacing:0.16em; }
      .title { fill:#E5E7EB; font-size:14px; font-weight:600; }
      .sub   { fill:#9CA3AF; font-size:11px; }
      .mono  { fill:#22D3EE; font-size:10px; font-family:'JetBrains Mono', ui-monospace, monospace; }
      .lbl   { fill:#9CA3AF; font-size:10px; }
      .num   { fill:#E5E7EB; font-size:13px; font-weight:600; font-variant-numeric: tabular-nums; }
      .band  { fill:#9CA3AF; font-size:10px; font-weight:700; letter-spacing:0.22em; }
    </style>
  </defs>

  <rect width="1400" height="900" fill="#0B1220"/>
  <rect width="1400" height="900" fill="url(#grid)"/>
  <rect width="1400" height="380" fill="url(#heroGlow)"/>

  <g transform="translate(40,40)">
    <text class="h">CAUSALOPS · END-TO-END ARCHITECTURE</text>
    <text y="22" class="sub">Every edge labelled with sample throughput from the demo seed.</text>
  </g>
  <g transform="translate(1360,46)" text-anchor="end">
    <text class="lbl">v0.1 · Apache 2.0</text>
  </g>

  <!-- SOURCE -->
  <rect x="0" y="100" width="1400" height="120" fill="url(#bandSource)"/>
  <g transform="translate(40,128)"><text class="band">SOURCE OF TRUTH</text></g>
  <g transform="translate(530,140)">
    <rect width="340" height="68" rx="14" fill="url(#gSource)" stroke="#10B981" stroke-width="1.5"/>
    <circle cx="22" cy="34" r="6" fill="#10B981" filter="url(#glow)"/>
    <text x="40" y="28" class="title">OpenMetadata 1.5</text>
    <text x="40" y="46" class="sub">lineage · events · DQ · tags</text>
    <text x="40" y="60" class="mono">:8585  /api/v1/*</text>
  </g>
  <g transform="translate(910,140)">
    <rect width="240" height="68" rx="12" fill="#101828" stroke="#1F2937"/>
    <text x="14" y="22" class="lbl">DEMO DATASET</text>
    <text x="14" y="42" class="num">9 entities · 11 edges</text>
    <text x="14" y="58" class="num">29 ChangeEvents · 63 DQ runs</text>
  </g>

  <!-- INGEST -->
  <rect x="0" y="240" width="1400" height="140" fill="url(#bandIngest)"/>
  <g transform="translate(40,268)"><text class="band">INGEST · BullMQ · Drizzle</text></g>
  <g transform="translate(220,280)">
    <rect width="220" height="78" rx="12" fill="url(#gIngest)" stroke="#22D3EE" stroke-width="1.2"/>
    <text x="14" y="22" class="title">pollLineage</text>
    <text x="14" y="40" class="sub">every 10 min</text>
    <text x="14" y="58" class="mono">GET /lineage/table/...</text>
    <text x="14" y="72" class="mono">→ 11 edges/sweep</text>
  </g>
  <g transform="translate(490,280)">
    <rect width="220" height="78" rx="12" fill="url(#gIngest)" stroke="#22D3EE" stroke-width="1.6"/>
    <circle cx="200" cy="14" r="3" fill="#22D3EE" filter="url(#glow)"/>
    <text x="14" y="22" class="title">pollEvents</text>
    <text x="14" y="40" class="sub">every 1 min · cursor</text>
    <text x="14" y="58" class="mono">GET /events?after=...</text>
    <text x="14" y="72" class="mono">→ ~47 evts/min peak</text>
  </g>
  <g transform="translate(760,280)">
    <rect width="220" height="78" rx="12" fill="url(#gIngest)" stroke="#22D3EE" stroke-width="1.2"/>
    <text x="14" y="22" class="title">pollTestResults</text>
    <text x="14" y="40" class="sub">every 5 min · cursor</text>
    <text x="14" y="58" class="mono">GET /testCaseResults</text>
    <text x="14" y="72" class="mono">→ 22 results/cycle</text>
  </g>
  <g transform="translate(1030,280)">
    <rect width="180" height="78" rx="12" fill="#101828" stroke="#1F2937"/>
    <text x="14" y="22" class="title">writeRiskScore</text>
    <text x="14" y="40" class="sub">on every RCA</text>
    <text x="14" y="58" class="mono">PATCH /tables/name/</text>
    <text x="14" y="72" class="mono">extension: { risk }</text>
  </g>

  <path d="M 700 208 C 700 240 330 250 330 280" class="hotPath" stroke="#22D3EE" stroke-width="1.5" fill="none" marker-end="url(#arrCyan)"/>
  <path d="M 700 208 C 700 240 600 250 600 280" class="hotPath" stroke="#22D3EE" stroke-width="2"   fill="none" marker-end="url(#arrCyan)"/>
  <path d="M 700 208 C 700 240 870 250 870 280" class="hotPath" stroke="#22D3EE" stroke-width="1.5" fill="none" marker-end="url(#arrCyan)"/>
  <path d="M 1120 280 C 1120 240 800 230 800 208" stroke="#A78BFA" stroke-width="1.4" stroke-dasharray="4 3" fill="none" marker-end="url(#arrViolet)"/>
  <text x="1090" y="252" class="lbl" fill="#A78BFA">writeback</text>

  <!-- STORE -->
  <rect x="0" y="400" width="1400" height="120" fill="url(#bandStore)"/>
  <g transform="translate(40,428)"><text class="band">STORE · TimescaleDB hypertables</text></g>
  <g transform="translate(390,432)">
    <rect width="620" height="76" rx="14" fill="url(#gStore)" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="22" y="26" class="title">change_events  ·  test_case_results  ·  lineage_edges  ·  entities</text>
    <g transform="translate(22,38)">
      <rect width="52" height="28" rx="4" fill="#0F1727" stroke="#F59E0B" stroke-opacity="0.5"/>
      <text x="26" y="18" text-anchor="middle" class="lbl">D-29</text>
      <rect x="60"  width="52" height="28" rx="4" fill="#0F1727" stroke="#F59E0B" stroke-opacity="0.4"/>
      <text x="86"  y="18" text-anchor="middle" class="lbl">D-15</text>
      <rect x="120" width="52" height="28" rx="4" fill="#0F1727" stroke="#F59E0B" stroke-opacity="0.5"/>
      <text x="146" y="18" text-anchor="middle" class="lbl">D-7</text>
      <rect x="180" width="52" height="28" rx="4" fill="#0F1727" stroke="#F59E0B" stroke-opacity="0.7"/>
      <text x="206" y="18" text-anchor="middle" class="lbl">D-1</text>
      <rect x="240" width="52" height="28" rx="4" fill="#F59E0B" fill-opacity="0.18" stroke="#F59E0B"/>
      <text x="266" y="18" text-anchor="middle" class="num" font-size="11">D+0</text>
      <text x="310" y="18" class="mono">1-day chunks · 30-day window typical</text>
    </g>
  </g>
  <g transform="translate(1030,432)">
    <rect width="180" height="76" rx="12" fill="#101828" stroke="#1F2937"/>
    <text x="14" y="22" class="lbl">QUERY HOT-PATH</text>
    <text x="14" y="42" class="num">backdoor over 30d</text>
    <text x="14" y="58" class="mono">~1M rows · partition prune</text>
  </g>
  <path d="M 330 358 C 330 390 480 400 480 432" class="hotPath" stroke="#22D3EE" stroke-width="1.5" fill="none" marker-end="url(#arrCyan)"/>
  <path d="M 600 358 C 600 390 700 400 700 432" class="hotPath" stroke="#22D3EE" stroke-width="2"   fill="none" marker-end="url(#arrCyan)"/>
  <path d="M 870 358 C 870 390 920 400 920 432" class="hotPath" stroke="#22D3EE" stroke-width="1.5" fill="none" marker-end="url(#arrCyan)"/>

  <!-- REASON -->
  <rect x="0" y="540" width="1400" height="130" fill="url(#bandReason)"/>
  <g transform="translate(40,568)"><text class="band">REASON · Python only</text></g>
  <g transform="translate(390,576)">
    <rect width="620" height="84" rx="14" fill="url(#gReason)" stroke="#A78BFA" stroke-width="1.5" filter="url(#glow)"/>
    <text x="22" y="26" class="title">causal-worker · FastAPI 0.115</text>
    <text x="22" y="44" class="sub">DoWhy backdoor adjustment + propensity-score matching · NetworkX DAG</text>
    <text x="22" y="62" class="mono">POST /rank_causes</text>
    <text x="22" y="76" class="mono">POST /intervention   · Monte-Carlo 2000 samples</text>
  </g>
  <g transform="translate(1030,576)">
    <rect width="180" height="84" rx="12" fill="#22D3EE" fill-opacity="0.06" stroke="#22D3EE"/>
    <text x="14" y="22" class="lbl">SAMPLE OUTPUT</text>
    <text x="14" y="42" class="num">orders</text>
    <text x="14" y="58" class="mono">effect 0.92</text>
    <text x="14" y="72" class="mono">CI [0.71, 1.00]</text>
  </g>
  <path d="M 700 508 C 700 530 700 550 700 576" class="hotPath" stroke="#A78BFA" stroke-width="2" fill="none" marker-end="url(#arrViolet)"/>
  <text x="710" y="544" class="lbl" fill="#A78BFA">asyncpg · read-only</text>

  <!-- SERVE -->
  <rect x="0" y="690" width="1400" height="170" fill="url(#bandServe)"/>
  <g transform="translate(40,718)"><text class="band">SERVE · Node + Browser</text></g>

  <g transform="translate(530,712)">
    <rect width="340" height="84" rx="14" fill="url(#gServe)" stroke="#22D3EE" stroke-width="1.6"/>
    <text x="22" y="26" class="title">API · Fastify 5 + tRPC 11</text>
    <text x="22" y="44" class="sub">graph · failures · counterfactual · intervention · events</text>
    <text x="22" y="62" class="mono">:3001  POST /trpc/*</text>
    <text x="22" y="76" class="mono">/webhook/om   /metrics</text>
  </g>

  <g transform="translate(180,720)">
    <rect width="240" height="68" rx="12" fill="url(#gServe)" stroke="#22D3EE" stroke-width="1.2"/>
    <text x="14" y="22" class="title">Web · Next.js 15</text>
    <text x="14" y="40" class="sub">Home · Graph · Why · What-if</text>
    <text x="14" y="58" class="mono">D3 force · Tailwind · :3000</text>
  </g>

  <g transform="translate(960,720)">
    <rect width="240" height="68" rx="12" fill="url(#gServe)" stroke="#22D3EE" stroke-width="1.2"/>
    <text x="14" y="22" class="title">MCP server</text>
    <text x="14" y="40" class="sub">4 tools · stdio + SSE</text>
    <text x="14" y="58" class="mono">rank_causes · simulate · risk · list</text>
  </g>

  <path d="M 530 754 L 420 754" stroke="#22D3EE" stroke-width="2" fill="none" marker-end="url(#arrCyan)"/>
  <path d="M 870 754 L 960 754" stroke="#22D3EE" stroke-width="2" fill="none" marker-end="url(#arrCyan)"/>
  <path d="M 700 660 L 700 712" class="hotPath" stroke="#22D3EE" stroke-width="2" fill="none" marker-end="url(#arrCyan)"/>

  <g transform="translate(180,820)"><text class="lbl">User · Browser</text></g>
  <g transform="translate(960,820)"><text class="lbl">OM chat · Claude Desktop</text></g>
  <path d="M 300 836 L 300 788" stroke="#6B7280" stroke-width="1.2" fill="none" marker-end="url(#arr)"/>
  <path d="M 1080 836 L 1080 788" stroke="#6B7280" stroke-width="1.2" fill="none" marker-end="url(#arr)"/>

  <!-- Footer -->
  <g transform="translate(40,880)">
    <text class="lbl">Validated:</text>
    <text x="62"  class="num" fill="#22D3EE">80%</text>
    <text x="98"  class="lbl">top-1 vs 50% baseline</text>
    <text x="232" class="lbl">·</text>
    <text x="244" class="num" fill="#22D3EE">0.90</text>
    <text x="280" class="lbl">MRR</text>
    <text x="308" class="lbl">·</text>
    <text x="320" class="num" fill="#22D3EE">100%</text>
    <text x="360" class="lbl">top-3 hit · across 20 ground-truth incidents</text>
  </g>
  <g transform="translate(1360,880)" text-anchor="end">
    <text class="mono">github.com/Sushant6095/Casusal-ops-metadata</text>
  </g>

  <g transform="translate(40,720)">
    <text class="band">LEGEND</text>
    <line x1="0" y1="14" x2="32" y2="14" stroke="#22D3EE" stroke-width="2" stroke-dasharray="8 4"/>
    <text x="40" y="18" class="lbl">hot path · animated</text>
    <line x1="0" y1="34" x2="32" y2="34" stroke="#A78BFA" stroke-width="1.4" stroke-dasharray="4 3"/>
    <text x="40" y="38" class="lbl">writeback / read</text>
    <line x1="0" y1="54" x2="32" y2="54" stroke="#6B7280" stroke-width="1.2"/>
    <text x="40" y="58" class="lbl">user-facing</text>
  </g>
</svg>
